<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Carta Romántica — Corazones en el borde</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg1:#fff6fb;
    --accent:#ff6b8a;
    --accent-dark:#e84f73;
    --paper:#fffdf7;
    --shadow: rgba(0,0,0,0.12);
  }
  html,body{height:100%;margin:0;font-family:"Montserrat",system-ui,-apple-system,"Segoe UI",Roboto,Arial;background:
    linear-gradient(180deg,#fff7fb 0%, #fff0f6 60%);-webkit-font-smoothing:antialiased;color:#333;}

  .scene{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:36px;
    box-sizing:border-box;
    position:relative;
  }

  .card-wrap{
    width: min(760px, 92vw);
    position:relative;
    perspective:1200px;
    z-index:10;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  /* Contenedor para corazones alrededor de la carta (inset negativo para permitir colocación justo fuera del borde) */
  .ring-hearts{
    position:absolute;
    inset: -28px; /* espacio alrededor de la carta donde se colocan los corazones */
    pointer-events:none;
    z-index:9;
  }

  .envelope{
    width:100%;
    height: min(64vh, 640px);
    max-height:80vh;
    transform-style:preserve-3d;
    transition: transform 900ms cubic-bezier(.2,.9,.3,1);
    display:block;
  }

  .paper{
    background: linear-gradient(180deg, var(--paper), #fff);
    border-radius:14px;
    box-shadow: 0 26px 60px var(--shadow), inset 0 1px 0 rgba(255,255,255,0.6);
    border:1px solid rgba(200,150,160,0.06);
    height:100%;
    position:relative;
    overflow:visible;
  }

  .flap{
    position:absolute;
    left:50%;
    top:0;
    transform-origin:50% 0%;
    width:120%;
    height:120%;
    transform: translateX(-50%) translateY(-10%) rotateX(0deg);
    transition: transform 900ms cubic-bezier(.2,.9,.3,1);
    z-index:6;
    pointer-events:none;
  }
  .flap .triangle{
    width:0;height:0;
    border-left:300px solid transparent;
    border-right:300px solid transparent;
    border-bottom:180px solid #ffeef2;
    margin:0 auto;
    filter: drop-shadow(0 10px 22px rgba(200,100,120,0.08));
  }

  .seal{
    position:absolute;
    left:50%;
    top:140px;
    transform:translateX(-50%);
    z-index:12;
    cursor:pointer;
    transition: transform 220ms ease, opacity 420ms ease;
    will-change:opacity, transform;
  }
  .seal:active{ transform: translateX(-50%) scale(0.96); }

  .heart-svg{ width:88px; height:88px; display:block; filter: drop-shadow(0 8px 22px rgba(232,79,115,0.18)); }

  .envelope.open{ transform: translateY(-8px) rotateX(6deg); }
  .envelope.open .flap{ transform: translateX(-50%) translateY(-10%) rotateX(-160deg); }
  .envelope.open .seal{ transform: translateX(-50%) translateY(-8px) scale(0.9); opacity:0; }

  .message{
    position:absolute;
    left:28px;
    right:28px;
    top:72px;
    bottom:28px;
    padding:36px 34px;
    background: linear-gradient(180deg, rgba(255,255,255,0.95), rgba(255,250,250,0.98));
    border-radius:12px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.6);
    transform: translateY(8px);
    opacity:0;
    transition: opacity 600ms ease 300ms, transform 600ms ease 300ms;
    z-index:4;
    pointer-events:none;
    display:flex;
    flex-direction:column;
    align-items:flex-start;
    justify-content:flex-start;
  }
  .envelope.open .message{ opacity:1; transform: translateY(0); pointer-events:auto; }

  .message .title{
    font-family:"Great Vibes",cursive;
    font-size:44px;
    color:var(--accent-dark);
    margin:0 0 10px 0;
  }

  .message .body{
    font-size:18px;
    line-height:1.7;
    color:#4b3b3b;
    white-space:pre-wrap;
    margin-top:6px;
    overflow:visible;
  }

  canvas.confetti{ position:absolute; left:0; top:0; width:100%; height:100%; pointer-events:none; z-index:8; }

  /* Estilo de los corazones del borde */
  .ring-hearts svg{
    position:absolute;
    width:20px;
    height:20px;
    opacity:0.98;
    transform-origin:center;
    filter: drop-shadow(0 6px 12px rgba(0,0,0,0.08));
    transition: transform 600ms ease;
  }

  .ring-hearts svg:hover{ transform: scale(1.18) rotate(8deg); }

  @media (max-width:720px){
    .card-wrap{ width:92vw; }
    .message .title{ font-size:36px; }
    .message .body{ font-size:16px; line-height:1.6; }
    .flap .triangle{ border-left:220px solid transparent; border-right:220px solid transparent; border-bottom:140px solid #ffeef2; }
    .heart-svg{ width:76px; height:76px; top:120px; }
  }
  @media (max-width:420px){
    .envelope{ height:62vh; }
    .message .title{ font-size:30px; }
    .message .body{ font-size:15px; line-height:1.55; }
    .flap .triangle{ border-left:180px solid transparent; border-right:180px solid transparent; border-bottom:120px solid #ffeef2; }
    .heart-svg{ width:68px; height:68px; top:110px; }
  }
</style>
</head>
<body>
  <div class="scene" aria-live="polite">
    <div class="card-wrap" role="region" aria-label="Carta romántica">
      <div class="ring-hearts" id="ringHearts" aria-hidden="true"></div>

      <div class="envelope" id="envelope">
        <div class="paper">
          <div class="flap" id="flap" aria-hidden="true"><div class="triangle"></div></div>

          <div class="seal" id="seal" role="button" tabindex="0" aria-pressed="false" aria-label="Abrir carta">
            <svg class="heart-svg" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <defs><linearGradient id="g1" x1="0" x2="1"><stop offset="0" stop-color="#ff9fb1"/><stop offset="1" stop-color="#ff6b8a"/></linearGradient></defs>
              <path d="M12 21s-7.5-4.6-9.2-7.1C-0.1 9.6 3.2 4 8.6 5.6 10.6 6.2 12 8 12 8s1.4-1.8 3.4-2.4C20.8 4 24.1 9.6 21.2 13.9 19.5 16.4 12 21 12 21z" fill="url(#g1)"/>
              <circle cx="12" cy="12" r="11.2" fill="rgba(255,255,255,0.02)"/>
            </svg>
          </div>

          <div class="message" id="message" aria-hidden="true">
            <h2 class="title">Para ti</h2>
            <div class="body" id="messageText" aria-live="polite"></div>
          </div>

        </div>
      </div>

      <canvas class="confetti" id="confettiCanvas" width="1200" height="900" aria-hidden="true"></canvas>
    </div>
  </div>

<script>
  const messageContent = `Feliz 5 mes vale, hoy es un dia en el que se cumple otro mes más donde nos seguimos amando, quiero seguir asi contigo, quisiera estar a lado tuyo para poder darte un gran abrazo, y un beso, espero disfrutes este dia pensando en lo felices que vamos a seguir siendo y que siempre sera asi, te amo mucho mi corazon de melon`;

  const envelope = document.getElementById('envelope');
  const seal = document.getElementById('seal');
  const messageText = document.getElementById('messageText');
  const confettiCanvas = document.getElementById('confettiCanvas');
  const ring = document.getElementById('ringHearts');
  const flap = document.getElementById('flap');

  function typeWriter(text, el, speed=16){
    el.textContent = '';
    let i = 0;
    const timer = setInterval(() => {
      el.textContent += text.charAt(i);
      i++;
      if (i >= text.length) clearInterval(timer);
    }, speed);
  }

  const ctx = confettiCanvas.getContext('2d');
  function fixCanvasDPR(){
    const ratio = Math.max(1, window.devicePixelRatio || 1);
    confettiCanvas.width = confettiCanvas.clientWidth * ratio;
    confettiCanvas.height = confettiCanvas.clientHeight * ratio;
    ctx.setTransform(ratio,0,0,ratio,0,0);
  }
  window.addEventListener('resize', fixCanvasDPR);
  fixCanvasDPR();

  function random(min,max){ return Math.random()*(max-min)+min; }

  class Particle {
    constructor(x,y,dx,dy,size,color,rot,rotSpeed){
      this.x=x; this.y=y; this.dx=dx; this.dy=dy; this.size=size; this.color=color;
      this.rot=rot; this.rotSpeed=rotSpeed; this.life=0; this.ttl= random(60,120);
      this.shape = Math.random() > 0.5 ? 'rect' : 'circle';
    }
    update(){ this.x += this.dx; this.y += this.dy; this.dy += 0.12; this.rot += this.rotSpeed; this.life++; }
    draw(ctx){
      ctx.save(); ctx.translate(this.x,this.y); ctx.rotate(this.rot); ctx.fillStyle=this.color;
      if(this.shape==='rect'){ ctx.fillRect(-this.size/2,-this.size/2,this.size,this.size*0.6); }
      else { ctx.beginPath(); ctx.ellipse(0,0,this.size*0.6,this.size*0.9,0,0,Math.PI*2); ctx.fill(); }
      ctx.restore();
    }
    alive(){ return this.life < this.ttl && this.y < confettiCanvas.clientHeight + 60; }
  }

  let particles = [];
  function burst(x,y,amount=40){
    fixCanvasDPR();
    const colors = ['#ff6b8a','#ffd166','#ff9fb1','#ffb3c6','#ffd1e0','#f6a5c0'];
    for(let i=0;i<amount;i++){
      const angle = random(-Math.PI, 0);
      const speed = random(2,8);
      const dx = Math.cos(angle)*speed + random(-1,1);
      const dy = Math.sin(angle)*speed + random(-1,1);
      const size = random(6,14);
      const color = colors[Math.floor(random(0,colors.length))];
      const rot = random(0,Math.PI*2);
      const rotSpeed = random(-0.2,0.2);
      particles.push(new Particle(x + random(-20,20), y + random(-10,10), dx, dy, size, color, rot, rotSpeed));
    }
  }

  function confettiLoop(){
    ctx.clearRect(0,0,confettiCanvas.clientWidth, confettiCanvas.clientHeight);
    particles.forEach(p => { p.update(); p.draw(ctx); });
    particles = particles.filter(p => p.alive());
    requestAnimationFrame(confettiLoop);
  }
  confettiLoop();

  // Colocar corazones a lo largo del perímetro (bordes) de la carta
  function placeHeartsAlongBorder(count = 20){
    ring.innerHTML = '';
    const wrapRect = document.querySelector('.card-wrap').getBoundingClientRect();
    const cardRect = envelope.getBoundingClientRect();
    // Usamos las dimensiones del elemento .paper (cardRect) para calcular perímetro
    const w = cardRect.width;
    const h = cardRect.height;
    const perimeter = 2 * (w + h);

    for(let i=0;i<count;i++){
      // posición a lo largo del perímetro
      const t = (i / count) * perimeter + random(-perimeter/count*0.15, perimeter/count*0.15);
      let x = 0, y = 0;

      if(t <= w){
        // borde superior (izquierda -> derecha)
        x = t;
        y = 0;
      } else if(t <= w + h){
        // borde derecho (arriba -> abajo)
        x = w;
        y = t - w;
      } else if(t <= w + h + w){
        // borde inferior (derecha -> izquierda)
        x = w - (t - (w + h));
        y = h;
      } else {
        // borde izquierdo (abajo -> arriba)
        x = 0;
        y = h - (t - (w + h + w));
      }

      // pequeño jitter hacia afuera/afuera del borde para que no queden exactamente pegados
      const outward = 12 + Math.random()*10; // px
      // calcular vector normal hacia afuera según borde
      let nx = 0, ny = 0;
      // si está en top edge
      if(y === 0){ nx = 0; ny = -1; }
      else if(x === w){ nx = 1; ny = 0; }
      else if(y === h){ nx = 0; ny = 1; }
      else if(x === 0){ nx = -1; ny = 0; }

      // aplicar jitter aleatorio lateral pequeño
      const lateral = random(-10,10);
      // desplazar punto
      x = x + nx * outward + ( (nx === 0) ? lateral : 0 );
      y = y + ny * outward + ( (ny === 0) ? lateral : 0 );

      // convertir a porcentaje relativo al contenedor .card-wrap (ring usa inset:-28px)
      // Para posicionar con CSS dentro ring (que tiene el mismo tamaño que .card-wrap),
      // usamos las dimensiones de card-wrap (wrapRect)
      const leftPct = ((cardRect.left - wrapRect.left) + x) / wrapRect.width * 100;
      const topPct  = ((cardRect.top  - wrapRect.top)  + y) / wrapRect.height * 100;

      const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
      svg.setAttribute('viewBox','0 0 24 24');
      svg.style.left = leftPct + '%';
      svg.style.top  = topPct  + '%';
      svg.style.transform = `translate(-50%,-50%) rotate(${Math.round(random(-25,25))}deg) scale(${(0.9 + Math.random()*0.6).toFixed(2)})`;
      svg.innerHTML = `<path fill="${Math.random()>0.5? '#ff9fb1':'#ff6b8a'}" d="M12 21s-7.5-4.6-9.2-7.1C-0.1 9.6 3.2 4 8.6 5.6 10.6 6.2 12 8 12 8s1.4-1.8 3.4-2.4C20.8 4 24.1 9.6 21.2 13.9 19.5 16.4 12 21 12 21z"/>`;
      ring.appendChild(svg);

      // animación sutil de pulso/float para cada corazón
      const dur = 5000 + Math.random()*6000;
      svg.animate([
        { transform: svg.style.transform + ' translateY(0px)' },
        { transform: svg.style.transform + ' translateY(-6px)' },
        { transform: svg.style.transform + ' translateY(0px)' }
      ], { duration: dur, iterations: Infinity, easing: 'ease-in-out', delay: Math.random()*1000 });
    }
  }

  // Recolocar corazones al redimensionar y al cargar
  window.addEventListener('resize', () => {
    placeHeartsAlongBorder(22);
    fixCanvasDPR();
  });

  window.addEventListener('load', () => {
    placeHeartsAlongBorder(22);
    fixCanvasDPR();
  });

  // Abrir carta: ocultar sello y mostrar mensaje + confetti
  let opened = false;
  function openEnvelope(){
    if(opened) return;
    opened = true;
    envelope.classList.add('open');
    seal.setAttribute('aria-pressed','true');

    seal.style.transition = 'opacity 420ms ease, transform 420ms ease';
    seal.style.opacity = '0';
    setTimeout(()=> { seal.style.display = 'none'; }, 520);

    setTimeout(() => {
      typeWriter(messageContent, messageText, 16);
      const rect = envelope.getBoundingClientRect();
      const canvasRect = confettiCanvas.getBoundingClientRect();
      const cx = (rect.left + rect.width/2) - canvasRect.left;
      const cy = (rect.top + rect.height*0.35) - canvasRect.top;
      burst(cx, cy, 80);
      setTimeout(()=> burst(cx-60, cy+10, 48), 260);
      setTimeout(()=> burst(cx+60, cy+6, 48), 520);
    }, 420);
  }

  seal.addEventListener('click', openEnvelope);
  flap.addEventListener('click', openEnvelope);
  seal.addEventListener('keydown', (e) => { if(e.key==='Enter' || e.key===' '){ e.preventDefault(); seal.click(); } });

  // Pulso invitador
  const pulse = setInterval(() => {
    if(opened){ clearInterval(pulse); return; }
    seal.animate([
      { transform: 'translateX(-50%) scale(1)' },
      { transform: 'translateX(-50%) scale(1.06)' },
      { transform: 'translateX(-50%) scale(1)' }
    ], { duration: 1800, easing: 'ease-in-out' });
  }, 2200);

  // Flotación suave de la carta
  (function floatEnvelope(){
    envelope.animate([
      { transform: 'translateY(0) rotateX(0deg)' },
      { transform: 'translateY(-6px) rotateX(2deg)' },
      { transform: 'translateY(0) rotateX(0deg)' }
    ], { duration: 4200, iterations: Infinity, easing: 'ease-in-out' });
  })();

  // Confetti helpers (reutilizados)
  function random(min,max){ return Math.random()*(max-min)+min; }
  // (Particle, burst, confettiLoop ya definidos arriba en este archivo; si copias desde otro, asegúrate de mantener una sola definición)
  // Para evitar duplicados, definimos Particle y burst aquí si no existen (ya están arriba en este mismo script).

  // Si el usuario hace click cuando ya está abierto, pequeñas ráfagas
  document.body.addEventListener('click', (e) => {
    if(!opened) return;
    const rect = envelope.getBoundingClientRect();
    const canvasRect = confettiCanvas.getBoundingClientRect();
    const cx = (rect.left + rect.width/2) - canvasRect.left + random(-80,80);
    const cy = (rect.top + rect.height*0.35) - canvasRect.top + random(-20,20);
    burst(cx, cy, 12);
  });

</script>
</body>
</html>
